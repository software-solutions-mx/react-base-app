name: Security

on:
  pull_request:
  push:
    branches:
      - staging
      - main
      - master
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency review
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@v4

      - name: Dependency review unavailable notice
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::Dependency review is not available for this repository. Enable Dependency graph in Settings > Security to enforce this check."

  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:deps
